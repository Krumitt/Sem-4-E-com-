<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SideQuest</title>
    <link rel="icon" type="image/png" href="../assets/images/logos/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // Prevent FOUC by applying dark mode immediately before body renders
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body class="overflow-hidden bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <!-- Absolute Toggle Button for Login Page -->
    <button id="dark-mode-btn"
        class="fixed top-4 right-4 z-50 cursor-pointer p-2 rounded-full bg-white/50 hover:bg-white/80 dark:bg-gray-800 dark:hover:bg-gray-700 transition shadow-sm">
        <!-- Sun Icon (Show in Dark) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden dark:block text-yellow-500" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <!-- Moon Icon (Show in Light) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 block dark:hidden text-gray-800 dark:text-gray-300" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>

    <!-- Page Wrapper -->
    <div id="page-wrapper"
        class="flex items-center justify-center min-h-screen px-4 transition-colors duration-300">

        <!-- Card Container -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-md p-8 relative">

            <!-- Back to Home Link -->
            <a href="index.html"
                class="absolute top-4 left-4 text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white flex items-center gap-2 text-sm font-medium transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                Back to Home
            </a>

            <!-- Logo -->
            <div class="flex flex-col items-center mb-8 mt-6">
                <!-- SVG Logo -->
                <svg viewBox="0 0 200 200" class="h-14 w-14 mb-3 text-gray-900 dark:text-white transition-colors duration-300" xmlns="http://www.w3.org/2000/svg">
                    <!-- Top Mountain -->
                    <path d="M20 90 L70 40 L95 65 L115 50 L160 90 L140 85 L115 70 L95 85 L70 60 Z" fill="currentColor" />
                    <!-- Bottom Reflection -->
                    <path d="M20 110 L70 160 L95 135 L115 150 L160 110 L140 115 L115 130 L95 115 L70 140 Z" fill="currentColor" />
                </svg>
                <h1 id="auth-title" class="text-2xl font-bold text-gray-900 dark:text-white">Welcome Back</h1>
                <p id="auth-subtitle" class="text-gray-500 dark:text-gray-400 text-sm">Sign in to continue your adventure</p>
            </div>


            <!-- Auth Forms Container -->
            <div id="auth-container">
                <!-- Login Form -->
                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
                        <input type="text" id="username" required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 rounded-md focus:ring-black dark:focus:ring-white focus:border-black dark:focus:border-white transition-colors"
                            placeholder="Enter your username">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                        <input type="password" id="password" required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 rounded-md focus:ring-black dark:focus:ring-white focus:border-black dark:focus:border-white transition-colors"
                            placeholder="Enter your password">
                    </div>

                    <button type="submit"
                        class="w-full bg-black dark:bg-white text-white dark:text-black font-medium py-3 rounded-md hover:bg-gray-800 dark:hover:bg-gray-200 transition mt-4">
                        Sign In
                    </button>

                    <div class="text-center mt-4 text-sm text-gray-600 dark:text-gray-400">
                        Don't have an account?
                        <button type="button" id="show-signup" class="text-black dark:text-white font-semibold hover:underline">Sign
                            up</button>
                    </div>
                </form>

                <!-- Signup Form (Hidden by default) -->
                <form id="signup-form" class="space-y-4 hidden">
                    <div>
                        <label for="reg-username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Choose a
                            Username</label>
                        <input type="text" id="reg-username" required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 rounded-md focus:ring-black dark:focus:ring-white focus:border-black dark:focus:border-white transition-colors"
                            placeholder="Choose a username">
                    </div>
                    <div>
                        <label for="reg-password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Create
                            Password</label>
                        <input type="password" id="reg-password" required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 rounded-md focus:ring-black dark:focus:ring-white focus:border-black dark:focus:border-white transition-colors"
                            placeholder="Create a password">
                    </div>

                    <button type="submit"
                        class="w-full bg-black dark:bg-white text-white dark:text-black font-medium py-3 rounded-md hover:bg-gray-800 dark:hover:bg-gray-200 transition mt-4">
                        Create Account
                    </button>

                    <div class="text-center mt-4 text-sm text-gray-600 dark:text-gray-400">
                        Already have an account?
                        <button type="button" id="show-login" class="text-black dark:text-white font-semibold hover:underline">Sign
                            in</button>
                    </div>
                </form>
            </div>

        </div>

    </div>
    <!-- Global JavaScript -->
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
